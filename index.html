<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aclonica&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <title>Note-app</title>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <header class="sidebar__header">
          <button
            class="sidebar__burger"
            type="button"
            aria-label="Toggle menu"
          ></button>
          <div class="sidebar__logo">Almdrasa-Notes</div>
        </header>
        <div class="sidebar__search">
          <img
            src="./src/assets/img/icons/search-svg.svg"
            alt="search-bar icon"
          />
          <input type="search" placeholder="Search" id="side-search" />
        </div>

        <nav class="nav-menu">
          <ul class="nav-menu__elements">
            <li class="nav-menu__element nav-menu__element--active">
              <a href="#">Notes</a>
            </li>
            <li class="nav-menu__element">
              <a href="#">Add Note</a>
            </li>
          </ul>
        </nav>
      </aside>

      <main class="content-area">
        <h1>Add Note</h1>

        <form class="note-form" id="note-form">
          <div class="note-form__group">
            <label for="title">Title*</label>
            <input type="text" id="title" required />
          </div>

          <div class="note-form__group">
            <label for="author">Author*</label>
            <input type="text" id="author" required />
          </div>

          <div class="note-form__group">
            <label for="note-text">Your Note*</label>
            <textarea id="note-text" rows="8" required></textarea>
          </div>

          <div class="note-form__actions">
            <button type="submit" class="note-form__btn--primary">
              Add Note
            </button>
            <button type="button" class="note-form__btn--secondary">
              Add pinned note
            </button>
          </div>
        </form>
      </main>
    </div>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
