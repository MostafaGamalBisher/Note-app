<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aclonica&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <title>Note-app</title>
  </head>
  <body>
    <div class="app" data-view="notes">
      <header class="mobile-header">
        <button
          class="mobile-header__burger"
          type="button"
          aria-label="Toggle menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="mobile-header__logo">Almdrasa-Notes</div>
        <button
          class="mobile-header__search-btn"
          type="button"
          aria-label="Open search"
        >
          <img src="./src/assets/img/icons/search-svg.svg" alt="" />
        </button>
      </header>

      <aside class="sidebar">
        <div class="sidebar__logo">Almdrasa-Notes</div>

        <div class="sidebar__search">
          <img src="./src/assets/img/icons/search-svg.svg" alt="" />
          <input
            class="sidebar__search-input"
            type="search"
            placeholder="Search"
            aria-label="Search notes"
          />
        </div>

        <nav class="nav-menu">
          <ul class="nav-menu__list">
            <li class="nav-menu__item nav-menu__item--active">
              <a href="#" class="nav-menu__link">Notes</a>
            </li>
            <li class="nav-menu__item">
              <a href="#" class="nav-menu__link">Add Notes</a>
            </li>
          </ul>
        </nav>
      </aside>

      <div class="notes-panel">
        <div class="notes-panel__list">
          <div class="notes-panel__section" id="pinned-section">
            <p class="notes-panel__label notes-panel__label--pinned">Pinned</p>
            <ul class="notes-panel__cards" id="pinned-cards">
              <!-- JS renders pinned cards here -->
            </ul>
          </div>

          <div class="notes-panel__section" id="notes-section">
            <p class="notes-panel__label">Notes</p>
            <ul class="notes-panel__cards" id="regular-cards">
              <!-- JS renders regular cards here -->
            </ul>
          </div>
        </div>
      </div>

      <main class="note-detail" id="note-detail">
        <div class="note-detail__empty" id="note-detail-empty">
          <p>Select a note to read it</p>
        </div>

        <div class="note-detail__content" id="note-detail-content">
          <h1 class="note-detail__title" id="note-detail-title"></h1>

          <p class="note-detail__meta" id="note-detail-meta">
            <span class="note-detail__date" id="note-detail-date"></span>
            <span class="note-detail__separator"> / By </span>
            <span class="note-detail__author" id="note-detail-author"></span>
          </p>

          <div class="note-detail__body" id="note-detail-body"></div>
        </div>

        <button class="note-detail__fab" type="button" aria-label="Add note">
          <span>+</span>
        </button>
      </main>

      <div class="content-area">
        <h1 class="content-area__title">Add Note</h1>

        <form class="note-form" id="note-form">
          <div class="note-form__group">
            <label class="note-form__label" for="note-title">Title*</label>
            <input
              class="note-form__input"
              type="text"
              id="note-title"
              placeholder="Enter note title"
              required
            />
          </div>

          <div class="note-form__group">
            <label class="note-form__label" for="note-author">Author*</label>
            <input
              class="note-form__input"
              type="text"
              id="note-author"
              placeholder="Enter author name"
              required
            />
          </div>

          <div class="note-form__group">
            <label class="note-form__label" for="note-body">Your Note*</label>
            <textarea
              class="note-form__textarea"
              id="note-body"
              rows="8"
              placeholder="Write your note here"
              required
            ></textarea>
          </div>

          <div class="note-form__actions">
            <button
              type="submit"
              class="note-form__btn note-form__btn--primary"
            >
              Add Note
            </button>
            <button
              type="button"
              class="note-form__btn note-form__btn--secondary"
              id="btn-add-pinned"
            >
              Add pinned note
            </button>
          </div>
        </form>
      </div>

      <div class="menu-overlay" id="menu-overlay">
        <button
          class="menu-overlay__close"
          type="button"
          aria-label="Close menu"
        >
          ✕
        </button>

        <nav class="nav-menu nav-menu--overlay">
          <ul class="nav-menu__list">
            <li class="nav-menu__item nav-menu__item--active">
              <a href="#" class="nav-menu__link">Notes</a>
            </li>
            <li class="nav-menu__item">
              <a href="#" class="nav-menu__link">Add Notes</a>
            </li>
          </ul>
        </nav>
      </div>

      <div class="search-overlay" id="search-overlay">
        <div class="search-overlay__header">
          <button
            class="search-overlay__burger"
            type="button"
            aria-label="Toggle menu"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>

          <div class="search-overlay__logo">Almdrasa-Notes</div>

          <button
            class="search-overlay__close"
            type="button"
            aria-label="Close search"
          >
            ✕
          </button>
        </div>

        <div class="search-overlay__search">
          <img src="./src/assets/img/icons/search-svg.svg" alt="" />
          <input
            class="search-overlay__input"
            type="search"
            placeholder="Search"
            aria-label="Search notes"
          />
        </div>

        <ul class="search-overlay__results" id="search-results">
          <!-- JS renders matching note cards here -->
        </ul>
      </div>

      <button class="fab" type="button" aria-label="Add note">
        <span>+</span>
      </button>
    </div>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
