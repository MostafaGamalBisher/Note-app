<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aclonica&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <title>Note-app</title>
  </head>
  <body>
    <div class="app" data-view="notes">
      <!-- MOBILE HEADER -->
      <header class="mobile-header">
        <button
          class="mobile-header__burger"
          type="button"
          aria-label="Toggle menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="mobile-header__logo">Almdrasa-Notes</div>
        <button
          class="mobile-header__search-btn"
          type="button"
          aria-label="Open search"
        >
          <img src="./src/assets/img/icons/search-svg.svg" alt="" />
        </button>
      </header>

      <!-- SIDEBAR (always visible on desktop) -->
      <aside class="sidebar"></aside>

      <!-- NOTES PANEL (home view) -->
      <div class="notes-panel"></div>

      <!-- NOTE DETAIL (home view) -->
      <main class="note-detail"></main>

      <!-- ADD NOTE (add-note view) -->
      <div class="content-area"></div>

      <!-- MOBILE OVERLAYS -->
      <div class="menu-overlay"></div>
      <div class="search-overlay"></div>

      <!-- FAB (mobile) -->
      <button class="fab" type="button" aria-label="Add note"></button>
    </div>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
